<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shifts67 — לוח משמרות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">shifts<span>67</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-title">לוח משמרות</div>
  </div>
  <div class="topbar-actions">
    <button class="btn" onclick="alert('Phase 2 — ניהול עובדים')">👥 עובדים</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="מצב כהה / בהיר">🌙</button>
    <button class="btn" onclick="alert('Phase 2 — הגדרות')">⚙</button>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="controls-right">
    <div class="select-wrap">
      <select id="stationSelect" onchange="render()">
        <option value="1">🏪 תחנת הטייסים</option>
        <option value="2">🏪 תחנת התקווה</option>
      </select>
    </div>
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">→</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="week-nav-btn" onclick="changeWeek(1)">←</button>
    </div>
    <button class="btn" onclick="goToday()">היום</button>
  </div>
  <div class="controls-left">
    <button class="btn btn-primary" onclick="openAddModal()">+ שיבוץ חדש</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">משמרות השבוע</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">משמרות חסרות</div>
    <div class="stat-value warning" id="statMissing">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">עובדים פעילים</div>
    <div class="stat-value good" id="statEmployees">0</div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--morning)"></div> בוקר 06:00–14:00</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--afternoon)"></div> צהריים 14:00–22:00</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--night)"></div> לילה 22:00–06:00</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fef3c7; border:1px solid #fde68a;"></div> שבת</div>
</div>

<!-- Schedule Table -->
<div class="schedule-wrap">
  <table class="schedule-table" id="scheduleTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Add Shift Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">שיבוץ חדש</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>עובד</label>
        <div class="select-wrap">
          <select id="modalEmployee"></select>
        </div>
      </div>
      <div class="form-group">
        <label>תפקיד</label>
        <div class="select-wrap">
          <select id="modalRole">
            <option value="1">🛒 קופאי</option>
            <option value="2">⛽ מתדלק</option>
            <option value="3">👔 מנהל תחנה</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>תאריך</label>
        <input type="date" id="modalDate" style="font-family:'Heebo',sans-serif; font-size:0.85rem; padding:8px 14px; border:1px solid var(--border); border-radius:8px;">
      </div>
      <div class="form-group">
        <label>משמרת</label>
        <div class="select-wrap">
          <select id="modalShift">
            <option value="morning">☀ בוקר (06:00–14:00)</option>
            <option value="afternoon">🌤 צהריים (14:00–22:00)</option>
            <option value="night">🌙 לילה (22:00–06:00)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="addShift()">שבץ</button>
      <button class="btn" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
